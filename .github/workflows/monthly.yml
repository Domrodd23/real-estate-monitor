name: Monthly data refresh

# Runs on the 5th of each month at 08:00 UTC, and on demand via the
# "Run workflow" button (workflow_dispatch) in the Actions tab.
on:
  schedule:
    - cron: "0 8 5 * *"
  workflow_dispatch: {}

# Allow the job to commit the refreshed /docs back to the repo.
permissions:
  contents: write

# Never run two refreshes at once.
concurrency:
  group: monthly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline (fetch -> compute -> build)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: python run.py

      - name: Commit refreshed dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --quiet --cached; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Monthly data refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
